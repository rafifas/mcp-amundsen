version: "3.8"
services:
  mcp-amundsen:
    build: .
    command: ["uvicorn", "run:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - AMUNDSEN_API_URL=http://host.docker.internal:5000
      - AMUNDSEN_SEARCH_API_URL=http://host.docker.internal:5001
      - FASTMCP_HOST=0.0.0.0
      - FASTMCP_PORT=8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
